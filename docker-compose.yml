version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: realestate_postgres
    environment:
      POSTGRES_DB: realestate_db
      POSTGRES_USER: realestate_user
      POSTGRES_PASSWORD: realestate_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - realestate_network

  redis:
    image: redis:7-alpine
    container_name: realestate_redis
    ports:
      - "6379:6379"
    networks:
      - realestate_network

volumes:
  postgres_data:

networks:
  realestate_network:
    driver: bridge