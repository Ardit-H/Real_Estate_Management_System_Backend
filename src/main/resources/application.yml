# ==================== APPLICATION ====================
spring:
  application:
    name: backend

  # ==================== DATABASE ====================
  datasource:
    url: jdbc:postgresql://localhost:5433/realestate_db
    username: realestate_user
    password: realestate_pass
    driver-class-name: org.postgresql.Driver

  # ==================== JPA ====================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # ==================== FLYWAY ====================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ==================== REDIS ====================
  data:
    redis:
      host: localhost
      port: 6379

  # ==================== CACHE ====================
  cache:
    type: redis

  # ==================== MAIL ====================
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ==================== JWT ====================
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

# ==================== ACTUATOR ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ==================== SERVER ====================
server:
  port: 8080

# ==================== SWAGGER ====================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html